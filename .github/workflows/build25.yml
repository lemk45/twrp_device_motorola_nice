name: Compilar TWRP Moto G86

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Ambiente Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev libncurses5-dev libncursesw5-dev libx11-dev zlib1g-dev libxml2-utils xsltproc unzip bc bison build-essential ccache curl flex g++ rsync libssl-dev python3

    - name: Maximizar Espaço em Disco
      uses: easimon/maximize-build-space@v8
      with:
        root-reserve-mb: 1024
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Baixar Código Fonte Mínimo do TWRP (Linha Pura)
      run: |
        # Garante um diretório limpo
        rm -rf twrp || true
        mkdir twrp
        cd twrp
        
        # Configura as credenciais globais exigidas pela ferramenta repo
        git config --global user.name "kathlendelimafarias-bit"
        git config --global user.email "kathlendelimafarias@gmail.com"
        
        # Cria a pasta de binários locais e baixa o script oficial do Google
        mkdir -p ~/bin
        curl https://raw.githubusercontent.com > ~/bin/repo
        chmod a+x ~/bin/repo
        
        # Inicializa o manifesto do TWRP 14 e força o uso do espelho estável do git-repo
        ~/bin/repo init --depth=1 --repo-url=https://github.com -u https://github.com -b twrp-14.0
        
        # Inicia a sincronização de todos os gigabytes de arquivos do Android
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clonar a Sua Device Tree
      uses: actions/checkout@v4
      with:
        path: twrp/device/motorola/nice

    - name: Executar a Compilação (Build)
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_nice-eng
        mka recoveryimage -j$(nproc --all)

    - name: Salvar o Arquivo .IMG Pronto
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-MotoG86-Nice
        path: twrp/out/target/product/nice/*.img
