name: Compilar TWRP Moto G86

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Ambiente Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev libncurses5-dev libncursesw5-dev libx11-dev zlib1g-dev libxml2-utils xsltproc unzip bc bison build-essential ccache curl flex g++ rsync libssl-dev python3

    - name: Maximizar Espaço em Disco
      uses: easimon/maximize-build-space@v8
      with:
        root-reserve-mb: 1024
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Clonar a Sua Device Tree Automaticamente
      uses: actions/checkout@v4
      with:
        path: twrp/device/motorola/nice

    - name: Sincronizar Código do TWRP e Compilar (Tudo Junto)
      run: |
        # Cria a pasta e entra nela
        mkdir -p twrp
        cd twrp
        
        # Configura as credenciais locais do Git
        git config --global user.name "kathlendelimafarias-bit"
        git config --global user.email "kathlendelimafarias@gmail.com"
        
        # Baixa o script do repo localmente na pasta certa
        curl https://raw.githubusercontent.com > ./repo
        chmod a+x ./repo
        
        # Inicializa e baixa todos os gigabytes de arquivos do Android 14
        python3 ./repo init --depth=1 --repo-url=https://github.com -u https://github.com -b twrp-14.0
        python3 ./repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        
        # Com todos os arquivos na pasta, carrega o ambiente e inicia a compilação real!
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_nice-eng
        mka recoveryimage -j$(nproc --all)

    - name: Salvar o Arquivo .IMG Pronto
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-MotoG86-Nice
        path: twrp/out/target/product/nice/*.img
